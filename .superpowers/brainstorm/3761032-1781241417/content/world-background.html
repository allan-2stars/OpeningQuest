<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Knight Meadows — World Background</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  background: #000;
  overflow: hidden;
  height: 100vh;
  display: flex;
  flex-direction: column;
  font-family: system-ui, sans-serif;
}

.toolbar {
  background: rgba(0,0,0,0.75);
  backdrop-filter: blur(10px);
  border-bottom: 1px solid rgba(255,255,255,0.08);
  padding: 9px 20px;
  display: flex;
  align-items: center;
  gap: 14px;
  flex-shrink: 0;
  z-index: 200;
}
.toolbar-title { font-size: 0.9rem; font-weight: 700; color: #f1f5f9; }
.toolbar-sub   { font-size: 0.75rem; color: #64748b; }

.map-scroll {
  flex: 1;
  overflow-x: auto;
  overflow-y: hidden;
  cursor: grab;
}
.map-scroll:active { cursor: grabbing; }
.map-scroll::-webkit-scrollbar { height: 6px; }
.map-scroll::-webkit-scrollbar-track { background: #111; }
.map-scroll::-webkit-scrollbar-thumb { background: #334155; border-radius: 3px; }

/* ── Canvas ── */
.world {
  position: relative;
  width: 1900px;
  height: calc(100vh - 40px);
  min-height: 660px;
  max-height: 880px;
  overflow: hidden;
  user-select: none;
}

/* ── Butterfly float ── */
@keyframes float {
  0%,100% { transform: translateY(0) rotate(-6deg) scaleX(1);   }
  25%      { transform: translateY(-10px) rotate(4deg) scaleX(1); }
  50%      { transform: translateY(-4px) rotate(-3deg) scaleX(-1); }
  75%      { transform: translateY(-14px) rotate(6deg) scaleX(-1); }
}
.flutter { animation: float 4.2s ease-in-out infinite; }

/* ── Cloud drift ── */
@keyframes drift {
  0%   { transform: translateX(0); }
  50%  { transform: translateX(18px); }
  100% { transform: translateX(0); }
}
.drift-slow { animation: drift 18s ease-in-out infinite; }
.drift-mid  { animation: drift 13s ease-in-out infinite 2s; }
.drift-fast { animation: drift 9s  ease-in-out infinite 1s; }

/* ── Campfire flicker ── */
@keyframes flicker {
  0%,100% { filter: drop-shadow(0 0 8px rgba(255,140,0,0.7)); }
  33%      { filter: drop-shadow(0 0 16px rgba(255,80,0,0.9)); }
  66%      { filter: drop-shadow(0 0 6px rgba(255,180,0,0.6)); }
}
.flicker { animation: flicker 1.8s ease-in-out infinite; }

/* zone label flavor text */
.zone-label {
  position: absolute;
  z-index: 60;
  font-size: 0.6rem;
  font-weight: 800;
  letter-spacing: 2px;
  text-transform: uppercase;
  color: rgba(255,255,255,0.38);
  text-shadow: 0 1px 6px rgba(0,0,0,0.7);
  pointer-events: none;
}
</style>
</head>

<script>
/* Drag-to-scroll */
const s = document.getElementById('scroll');
let drag = false, sx = 0, sl = 0;
s.addEventListener('mousedown', e => { drag=true; sx=e.pageX-s.offsetLeft; sl=s.scrollLeft; s.style.cursor='grabbing'; });
document.addEventListener('mouseup',   () => { drag=false; s.style.cursor=''; });
document.addEventListener('mousemove', e => {
  if (!drag) return;
  e.preventDefault();
  s.scrollLeft = sl - (e.pageX - s.offsetLeft - sx);
});

/* Auto-scroll hint — gently pan right on load so user sees more of the world */
window.addEventListener('load', () => {
  let done = false;
  const hint = setInterval(() => {
    if (done || s.scrollLeft >= 200) { clearInterval(hint); return; }
    s.scrollLeft += 1.2;
    if (s.scrollLeft >= 200) done = true;
  }, 12);
});
</script>

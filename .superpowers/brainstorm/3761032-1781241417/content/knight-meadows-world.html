<!DOCTYPE html>

<head>
<meta charset="UTF-8">
<title>Knight Meadows — World Map</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  background: #0a1220;
  overflow: hidden;
  height: 100vh;
  display: flex;
  flex-direction: column;
}

/* ── Top bar ── */
.toolbar {
  background: rgba(0,0,0,0.7);
  backdrop-filter: blur(8px);
  border-bottom: 1px solid rgba(255,255,255,0.1);
  padding: 10px 20px;
  display: flex;
  align-items: center;
  gap: 16px;
  z-index: 100;
  flex-shrink: 0;
}
.toolbar h1 {
  font-family: system-ui, sans-serif;
  font-size: 1rem;
  font-weight: 700;
  color: #f8fafc;
  letter-spacing: 0.5px;
}
.toolbar span {
  color: #64748b;
  font-size: 0.8rem;
  font-family: system-ui, sans-serif;
}
.toggle-btn {
  margin-left: auto;
  padding: 6px 16px;
  border-radius: 8px;
  border: 1px solid #4ade80;
  background: rgba(74,222,128,0.1);
  color: #4ade80;
  font-size: 0.8rem;
  font-weight: 600;
  cursor: pointer;
  font-family: system-ui, sans-serif;
  transition: all 0.2s;
}
.toggle-btn:hover { background: rgba(74,222,128,0.2); }

/* ── Scrollable map wrapper ── */
.map-wrapper {
  flex: 1;
  overflow-x: auto;
  overflow-y: hidden;
  position: relative;
  cursor: grab;
}
.map-wrapper:active { cursor: grabbing; }

/* ── The world canvas ── */
.world {
  position: relative;
  width: 1800px;
  height: 100%;
  min-height: 680px;
  overflow: hidden;
  user-select: none;
}

/* ── Lesson Nodes ── */
.node {
  position: absolute;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 4px;
  z-index: 50;
  transform: translate(-50%, -50%);
  cursor: pointer;
  transition: opacity 0.4s, transform 0.15s;
}
.node:hover { transform: translate(-50%, -50%) scale(1.08); }

.node-ring {
  border-radius: 50%;
  border: 4px solid;
  display: flex;
  align-items: center;
  justify-content: center;
  box-shadow: 0 4px 14px rgba(0,0,0,0.5), inset 0 2px 4px rgba(255,255,255,0.2);
}

.node-label {
  background: rgba(0,0,0,0.78);
  color: #fff;
  font-size: 0.58rem;
  font-weight: 700;
  padding: 2px 8px;
  border-radius: 99px;
  white-space: nowrap;
  font-family: system-ui, sans-serif;
  letter-spacing: 0.4px;
}

/* States */
.mastered .node-ring {
  width: 54px; height: 54px; font-size: 1.3rem;
  background: linear-gradient(145deg, #6ee7b7, #10b981);
  border-color: #34d399;
}
.available .node-ring {
  width: 58px; height: 58px; font-size: 1.35rem;
  background: linear-gradient(145deg, #fde68a, #f59e0b);
  border-color: #fcd34d;
  box-shadow: 0 4px 14px rgba(0,0,0,0.5), 0 0 18px rgba(251,191,36,0.45), inset 0 2px 4px rgba(255,255,255,0.25);
}
.locked .node-ring {
  width: 50px; height: 50px; font-size: 1.1rem;
  background: linear-gradient(145deg, #6b7280, #374151);
  border-color: #9ca3af;
  opacity: 0.55;
}
.boss .node-ring {
  width: 72px; height: 72px; font-size: 1.7rem;
  background: linear-gradient(145deg, #c084fc, #7c3aed);
  border-color: #e879f9;
  border-width: 5px;
  box-shadow: 0 6px 20px rgba(0,0,0,0.6), 0 0 28px rgba(192,132,252,0.5), inset 0 2px 4px rgba(255,255,255,0.2);
}

/* Hidden nodes test */
.nodes-hidden .node { opacity: 0; pointer-events: none; }
</style>
</head>

<style>
@keyframes flutter {
  0%, 100% { transform: translateY(0) rotate(-5deg); }
  50%       { transform: translateY(-8px) rotate(5deg); }
}
</style>

<script>
// Toggle nodes on/off (WORLD FIRST test)
function toggleNodes(btn) {
  const world = document.getElementById('world');
  const hidden = world.classList.toggle('nodes-hidden');
  btn.textContent = hidden ? 'Show Lesson Nodes' : 'Hide Lesson Nodes';
  btn.style.borderColor = hidden ? '#f59e0b' : '#4ade80';
  btn.style.color = hidden ? '#f59e0b' : '#4ade80';
  btn.style.background = hidden ? 'rgba(245,158,11,0.1)' : 'rgba(74,222,128,0.1)';
}

// Drag-to-scroll
const wrapper = document.getElementById('wrapper');
let isDragging = false, startX = 0, scrollLeft = 0;
wrapper.addEventListener('mousedown', e => {
  isDragging = true;
  startX = e.pageX - wrapper.offsetLeft;
  scrollLeft = wrapper.scrollLeft;
});
document.addEventListener('mouseup', () => { isDragging = false; });
document.addEventListener('mousemove', e => {
  if (!isDragging) return;
  e.preventDefault();
  const x = e.pageX - wrapper.offsetLeft;
  wrapper.scrollLeft = scrollLeft - (x - startX);
});
</script>
